<svg viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="experience">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s} .a4{animation-delay:.75s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>

  <line x1="120" y1="10" x2="120" y2="210" stroke="var(--accent)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text class="mono" x="50" y="67"  font-size="14" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="42" font-size="15" fill="var(--bone)">Celebal Technologies · Data Engineering Intern · Remote · May–Jul</text>
    <text class="mono" x="136" y="68" font-size="14" fill="var(--muted)">built an NLP emotion-detection system in Python to classify six emotions</text>
    <text class="mono" x="136" y="90" font-size="14" fill="var(--muted)">used text cleaning, TF-IDF vectorization, and n-grams for higher accuracy</text>
  </g>

  <g class="rise a2">
    <text class="mono" x="50" y="163"  font-size="14" fill="var(--accent)" letter-spacing="2">2024</text>
    <text class="mono" x="136" y="138" font-size="15" fill="var(--bone)">Infosys · DS and AI Intern · Remote · Oct–Dec</text>
    <text class="mono" x="136" y="164" font-size="14" fill="var(--muted)">built a multilingual speech-to-speech video translation platform for 12 languages</text>
    <text class="mono" x="136" y="186" font-size="14" fill="var(--muted)">Whisper → Gemini → gTTS pipeline with MoviePy-based video processing</text>
  </g>
</svg>
