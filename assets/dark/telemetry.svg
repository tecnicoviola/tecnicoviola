<svg viewBox="0 0 1000 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="telemetry">
  <style>
    :root { --bone: #ffffff; --muted: #888888; --dim: #AAAAAA; --rule: #C0C0C0; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #ffffff; --muted: #777777; --dim: #666666; --rule: #444444; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .bar { transform: scaleX(0); animation: grow 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes grow { to { transform: scaleX(1); } }
    .g1{transform-origin:48px 0;animation-delay:.3s}.g2{transform-origin:48px 0;animation-delay:.45s}.g3{transform-origin:48px 0;animation-delay:.6s}
    .g4{transform-origin:48px 0;animation-delay:.75s}.g5{transform-origin:48px 0;animation-delay:.9s}.g6{transform-origin:48px 0;animation-delay:1.05s}
    .spark { stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.2s cubic-bezier(.6,0,.2,1) .5s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .dot { opacity: 0; animation: fade .4s ease forwards; }
    .d1{animation-delay:1.0s}.d2{animation-delay:1.3s}.d3{animation-delay:1.6s}.d4{animation-delay:1.9s}.d5{animation-delay:2.2s}.d6{animation-delay:2.5s}
    @keyframes fade { to { opacity: 1; } }
    .rise { opacity: 0; animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .n1{animation-delay:.5s}.n2{animation-delay:.7s}.n3{animation-delay:.9s}.n4{animation-delay:1.1s}
    .ping { animation: ping 2.2s ease-out infinite; transform-origin: 622px 112px; }
    @keyframes ping { 0%{transform:scale(.4);opacity:.9} 80%,100%{transform:scale(2.8);opacity:0} }
    @media (prefers-reduced-motion: reduce) {
      .bar,.spark,.dot,.rise,.ping { animation: none; }
      .bar{transform:scaleX(1)} .spark{stroke-dashoffset:0} .dot,.rise{opacity:1} .ping{opacity:0}
    }
</style>

  <line x1="48" y1="40" x2="952" y2="40" stroke="var(--rule)"/>
  <text fill="var(--bone)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">TELEMETRY — WHAT I'M WORKING ON</text>
  <line x1="360" y1="64" x2="360" y2="296" stroke="var(--rule)" opacity=".4"/>
  <line x1="688" y1="64" x2="688" y2="296" stroke="var(--rule)" opacity=".4"/>

  <!-- language bars — stepped greys -->
  <text fill="var(--accent)" class="mono" x="48" y="78" font-size="10" letter-spacing="2.5">LANGUAGE DISTRIBUTION · EST.</text>
  <g class="mono" font-size="11">
    <text fill="var(--accent)" x="48" y="108">node.js</text>       <rect class="bar g1" x="48" y="116" width="230" height="6" fill="var(--bone)"/><text fill="var(--bone)" x="288" y="123" font-size="10">27%</text>
    <text fill="var(--accent)" x="48" y="146">javascript</text>  <rect class="bar g2" x="48" y="154" width="205" height="6" fill="var(--bone)"/><text fill="var(--bone)" x="263" y="161" font-size="10">24%</text>
    <text fill="var(--accent)" x="48" y="184">typescript</text>      <rect class="bar g3" x="48" y="192" width="145" height="6" fill="var(--bone)"/><text fill="var(--bone)" x="203" y="199" font-size="10">17%</text>
    <text fill="var(--accent)" x="48" y="222">SQL</text>  <rect class="bar g4" x="48" y="230" width="110" height="6" fill="var(--bone)"/><text fill="var(--bone)" x="168" y="237" font-size="10">13%</text>
    <text fill="var(--accent)" x="48" y="260">python</text>        <rect class="bar g5" x="48" y="268" width="85"  height="6" fill="var(--bone)"/><text fill="var(--bone)" x="143" y="275" font-size="10">10%</text>
    <text fill="var(--accent)" x="48" y="298">c++ · other</text> <rect class="bar g6" x="48" y="306" width="68"  height="6" fill="var(--bone)"/><text fill="var(--bone)" x="126" y="313" font-size="10">9%</text>
  </g>

  <!-- shipping velocity -->
  <text fill="var(--accent)" class="mono" x="392" y="78" font-size="10" letter-spacing="2.5">SHIPPING VELOCITY · 2022 → 2026</text>
  <g>
    <line x1="392" y1="252" x2="656" y2="252" stroke="var(--dim)"/>
    <polyline class="spark" points="392,240 440,232 488,210 536,188 584,148 622,112 656,92" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
    <circle class="dot d1" cx="440" cy="232" r="2.5" fill="var(--bone)"/>
    <circle class="dot d2" cx="488" cy="210" r="2.5" fill="var(--bone)"/>
    <circle class="dot d3" cx="536" cy="188" r="2.5" fill="var(--bone)"/>
    <circle class="dot d4" cx="584" cy="148" r="2.5" fill="var(--bone)"/>
    <circle class="ping" cx="622" cy="112" r="4" stroke="var(--bone)" fill="none"/>
    <circle class="dot d5" cx="622" cy="112" r="3" fill="var(--bone)"/>
    <text fill="var(--bone)" class="mono" x="392" y="272" font-size="9.5" letter-spacing="1.5">'22</text>
    <text fill="var(--bone)" class="mono" x="524" y="272" font-size="9.5" letter-spacing="1.5">'24</text>
    <text fill="var(--bone)" class="mono" x="640" y="272" font-size="9.5" letter-spacing="1.5">'26</text>
    <text fill="var(--accent)" class="mono dot d6" x="392" y="300" font-size="10" letter-spacing="1.5">skills — <tspan fill="var(--accent)">accelerating</tspan></text>
  </g>

  <!-- profile counters -->
  <text fill="var(--accent)" class="mono" x="720" y="78" font-size="10" letter-spacing="2.5">PROFILE COUNTERS</text>
  <g>
    <g class="rise n1"><text fill="var(--accent)" class="mono" x="720" y="130" font-size="44">38</text><text fill="var(--bone)" class="mono" x="790" y="118" font-size="10" letter-spacing="2.5">REPOSITORIES</text></g>
    <g class="rise n2"><text fill="var(--accent)" class="mono" x="720" y="190" font-size="44">15</text><text fill="var(--bone)" class="mono" x="790" y="180" font-size="10" letter-spacing="2.5">PROJECTS DOCUMENTED</text></g>
    <g class="rise n3"><text fill="var(--accent)" class="mono" x="720" y="250" font-size="44">04</text><text fill="var(--bone)" class="mono" x="790" y="231" font-size="10" letter-spacing="2.5">PLATFORMS —</text></g>
    <g class="rise n3"><text fill="var(--accent)" class="mono" x="720" y="250" font-size="44"></text><text fill="var(--bone)" class="mono" x="790" y="242" font-size="10" letter-spacing="2.5">WEB / AI / DEVOPS/ WEB3</text></g>
    <g class="rise n4"><text fill="var(--accent)" class="mono" x="720" y="312" font-size="88">∞</text><text fill="var(--bone)" class="mono" x="790" y="292" font-size="10" letter-spacing="2.5">OPEN TERMINAL TABS</text></g>
  </g>
</svg>
