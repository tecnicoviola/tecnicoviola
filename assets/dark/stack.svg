<svg viewBox="0 0 1000 238" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stack">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .6s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.1s} .a2{animation-delay:.2s} .a3{animation-delay:.3s} .a4{animation-delay:.4s} .a5{animation-delay:.5s} .a6{animation-delay:.6s} .a7{animation-delay:.7s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
  </style>

  <line x1="138" y1="8" x2="138" y2="230" stroke="var(--accent)" stroke-width="1" opacity=".4"/>

  <text class="mono rise a1" x="48" y="32"  font-size="12" fill="var(--accent)" letter-spacing="2">LANGUAGES</text>
  <text class="mono rise a1" x="154" y="32"  font-size="15" fill="var(--bone)">C · C++ · Python · JavaScript · Typescript · SQL · RawSQL</text>

  <text class="mono rise a2" x="48" y="64"  font-size="12" fill="var(--accent)" letter-spacing="2">BACKEND</text>
  <text class="mono rise a2" x="154" y="64"  font-size="15" fill="var(--bone)">Node.js · Express · Flask · JWT · REST APIs</text>

  <text class="mono rise a3" x="48" y="96"  font-size="12" fill="var(--accent)" letter-spacing="2">DATABASES</text>
  <text class="mono rise a3" x="154" y="96"  font-size="15" fill="var(--bone)">MongoDB · MySQL · PostgreSQL</text>

  <text class="mono rise a4" x="48" y="128" font-size="12" fill="var(--accent)" letter-spacing="2">WEB</text>
  <text class="mono rise a4" x="154" y="128" font-size="15" fill="var(--bone)">HTML5 · CSS3 · Tailwind CSS · React · Next.js</text>

  <text class="mono rise a5" x="48" y="160" font-size="12" fill="var(--accent)" letter-spacing="2">DEVOPS</text>
  <text class="mono rise a5" x="154" y="160" font-size="15" fill="var(--bone)">Docker · AWS · CI/CD Pipelines</text>

  <text class="mono rise a6" x="48" y="192" font-size="12" fill="var(--accent)" letter-spacing="2">AI</text>
  <text class="mono rise a6" x="154" y="192" font-size="15" fill="var(--bone)">MCP servers · OpenRouter · AI-native architectures</text>

  <text class="mono rise a7" x="48" y="224" font-size="12" fill="var(--accent)" letter-spacing="2">TOOLING</text>
  <text class="mono rise a7" x="154" y="224" font-size="15" fill="var(--bone)">Git · Figma · Notion · Postman · VSCode</text>
</svg>
